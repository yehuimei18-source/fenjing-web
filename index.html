<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seedance 2.0 · 视频提示词工作台</title>
<style>
:root{--bg:#0a0a0f;--sidebar:#12121a;--surface:#161622;--border:#252540;--text:#d0d0d8;--muted:#7a7a90;--accent:#e8b4b8;--accent2:#c9a0dc;--user:#1e3a5f;--ai:#1a1a2e;--danger:#ff6b6b;--success:#51cf66;--input:#1c1c2e;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
#gate{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column}
#gate h1{font-size:2.4em;margin-bottom:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#gate p{color:var(--muted);margin-bottom:24px}
#gate input{width:260px;padding:12px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--input);color:var(--text);font-size:1.1em;text-align:center;letter-spacing:4px;outline:none}
#gate input:focus{border-color:var(--accent)}
#gate button{margin-top:12px;padding:12px 48px;border-radius:var(--radius);border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0a0a0f;font-size:1em;font-weight:600;cursor:pointer}
#gate .err{color:var(--danger);margin-top:8px;font-size:.9em;display:none}
#app{display:none;height:100vh;grid-template-columns:280px 1fr}
body.ready #gate{display:none}
body.ready #app{display:grid}
#sidebar{background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#sidebar .head{padding:20px;border-bottom:1px solid var(--border)}
#sidebar .head h2{font-size:1.1em;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#sidebar .head .ver{font-size:.7em;color:var(--muted)}
#sidebar nav{flex:1;overflow-y:auto;padding:12px}
#sidebar nav h3{font-size:.75em;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px 8px}
#sidebar nav button{display:block;width:100%;text-align:left;padding:10px 14px;border:none;border-radius:8px;background:transparent;color:var(--text);font-size:.9em;cursor:pointer;margin-bottom:2px}
#sidebar nav button:hover{background:var(--surface)}
#sidebar nav button.active{background:var(--surface);color:var(--accent)}
#sidebar nav button .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:8px;vertical-align:middle;background:var(--muted)}
#sidebar nav button.active .dot{background:var(--success)}
#sidebar .foot{padding:16px;border-top:1px solid var(--border);display:flex;gap:8px}
#sidebar .foot button{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.8em;cursor:pointer}
#sidebar .foot button:hover{border-color:var(--accent)}
#chat{display:flex;flex-direction:column;overflow:hidden}
#chat .header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
#chat .header h2{font-size:1em}
#messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
#messages .msg{max-width:85%;padding:14px 18px;border-radius:var(--radius);line-height:1.6;font-size:.92em;white-space:pre-wrap;word-break:break-word}
#messages .msg.user{align-self:flex-end;background:var(--user);border-bottom-right-radius:4px}
#messages .msg.ai{align-self:flex-start;background:var(--ai);border-bottom-left-radius:4px;border:1px solid var(--border)}
#messages .msg.system{align-self:center;background:transparent;color:var(--muted);font-size:.8em;padding:4px 12px;text-align:center}
#messages .msg.update-card{align-self:flex-start;background:var(--ai);border:1px solid var(--accent2)}
#messages .msg button{padding:9px 18px;border-radius:8px;border:none;background:var(--accent);color:#0a0a0f;font-weight:600;cursor:pointer;margin:8px 8px 0 0;font-size:.9em}
#messages .msg button.ghost{background:var(--surface);color:var(--text);border:1px solid var(--border)}
#input-area{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px}
#input-area textarea{flex:1;padding:12px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--input);color:var(--text);font-size:.92em;resize:none;outline:none;min-height:44px;max-height:120px;font-family:inherit}
#input-area textarea:focus{border-color:var(--accent)}
#input-area button{padding:12px 20px;border-radius:var(--radius);border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0a0a0f;font-weight:600;cursor:pointer;font-size:.9em}
#input-area button:disabled{opacity:.4}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;width:520px;max-width:95vw;max-height:92vh;overflow-y:auto}
.modal h3{margin-bottom:16px}
.modal label{display:block;font-size:.85em;color:var(--muted);margin-bottom:6px}
.modal input,.modal textarea,.modal select{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--input);color:var(--text);font-size:.9em;margin-bottom:14px;outline:none;font-family:inherit}
.modal input:focus,.modal textarea:focus{border-color:var(--accent)}
.modal textarea{min-height:220px;font-family:Consolas,monospace;font-size:.8em}
.modal .btns{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.modal .btns button{padding:10px 22px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:.9em}
.modal .btns .primary{background:var(--accent);color:#0a0a0f}
.modal .btns .secondary{background:var(--border);color:var(--text)}
.modal small{color:var(--muted);display:block;margin:-8px 0 12px;line-height:1.5}
.modal small a{color:var(--accent)}
#status{position:fixed;bottom:12px;right:16px;font-size:.75em;color:var(--muted);z-index:10}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.loading{animation:pulse 1.2s infinite}
@media(max-width:768px){#app{grid-template-columns:1fr}#sidebar{display:none}}
</style>
</head>
<body>
<div id="gate">
<h1>🎬 Seedance 2.0</h1>
<p>即梦视频提示词 · AI 工作台</p>
<input type="password" id="pwd-input" placeholder="请输入密码" maxlength="20" onkeydown="if(event.key==='Enter')checkPassword()">
<button onclick="checkPassword()">进入</button>
<div class="err" id="pwd-err">密码错误</div>
</div>

<div id="app">
  <aside id="sidebar">
    <div class="head">
      <h2>Seedance Workbench</h2>
      <span class="ver">v3.0 · 私有仓库直连</span>
    </div>
    <nav>
      <h3>📋 记忆库（点击加载/卸载）</h3>
      <div id="memory-list"></div>
    </nav>
    <div class="foot">
      <button onclick="openSettings()">⚙️ 设置</button>
      <button onclick="openUpdateRules()">📝 编辑规则</button>
    </div>
  </aside>

  <main id="chat">
    <div class="header">
      <h2>💬 提示词对话</h2>
      <span style="font-size:.8em;color:var(--muted)" id="ctx-indicator">规则库: 未加载</span>
    </div>
    <div id="messages">
      <div class="msg system">=== Seedance 2.0 视频提示词工作台 ===
描述你想要的视频，AI 按你的私有规则库生成即梦提示词。
对话中说「更新规则：XXX」可让 AI 修改规则并一键推送回 GitHub。
首次使用请点左下角「设置」填入两个密钥。</div>
    </div>
    <div id="input-area">
      <textarea id="user-input" placeholder="例如：一段15秒的赛博朋克风格打斗场景..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
      <button onclick="sendMessage()" id="send-btn">发送</button>
    </div>
  </main>
</div>
<div id="status"><span id="stat-text"></span></div>

<script>
// ================= 配置 =================
const GH_OWNER = 'yehuimei18-source';
const GH_REPO  = 'fenjing';               // 私有内容仓库
const SKILL_PATH = 'skills/seedance/SKILL.md';
const APP_PASSWORD = '5951395';
const MEMORIES = [
  ['seedance-preflight-checklist','强制门禁系统'],
  ['seedance-agent-blueprint','Agent 蓝图'],
  ['seedance-prompt-style-guide','提示词风格指南'],
  ['cinematic-shot-encyclopedia','100种镜头类型'],
  ['seedance-lighting-filters-guide','布光与滤镜指南'],
  ['seedance-atmospheric-realism','大气真实感方法'],
  ['seedance-lessons-from-test','实测反馈修正'],
  ['seedance-project-map','项目逻辑地图'],
  ['seedance-prompt-techniques-research','技巧研究汇总'],
  ['emerging-visual-styles-library','视觉风格库']
];

// ================= 状态 =================
let state = {
  apiKey: localStorage.getItem('sd_api_key') ? atob(localStorage.getItem('sd_api_key')) : null,
  ghToken: localStorage.getItem('sd_gh_token') ? atob(localStorage.getItem('sd_gh_token')) : null,
  model: localStorage.getItem('sd_model') || 'deepseek/deepseek-v4-pro',
  skillContent: null, skillSha: null, skillLoaded: false,
  loadedMemories: {}, messages: [], pendingUpdate: null
};

// ================= GitHub API =================
function ghHeaders(raw) {
  const h = { 'Authorization': 'Bearer ' + state.ghToken, 'X-GitHub-Api-Version': '2022-11-28' };
  h['Accept'] = raw ? 'application/vnd.github.raw+json' : 'application/vnd.github+json';
  return h;
}
async function ghRead(path) {
  const r = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}?t=${Date.now()}`, { headers: ghHeaders(true), cache:'no-store' });
  if (r.status === 401) throw new Error('GitHub 令牌无效或过期，请到「设置」更新');
  if (r.status === 404) throw new Error('文件不存在或令牌无此仓库权限: ' + path);
  if (!r.ok) throw new Error('GitHub API 错误 ' + r.status);
  return await r.text();
}
async function ghGetSha(path) {
  const r = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}?t=${Date.now()}`, { headers: ghHeaders(false), cache:'no-store' });
  if (!r.ok) throw new Error('获取文件信息失败 ' + r.status);
  return (await r.json()).sha;
}
async function ghWrite(path, content, message) {
  const sha = await ghGetSha(path);
  const b64 = btoa(unescape(encodeURIComponent(content)));
  const r = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`, {
    method: 'PUT', headers: ghHeaders(false),
    body: JSON.stringify({ message, content: b64, sha })
  });
  if (r.status === 403 || r.status === 401) throw new Error('令牌没有写入权限（需要 Contents: Read and write）');
  if (!r.ok) throw new Error('推送失败 ' + r.status + ': ' + (await r.text()).slice(0,150));
  return (await r.json()).commit.sha.slice(0,7);
}

// ================= 初始化 =================
function checkPassword() {
  if (document.getElementById('pwd-input').value.trim() === APP_PASSWORD) {
    sessionStorage.setItem('sd_auth','1');
    document.body.classList.add('ready');
    boot();
  } else document.getElementById('pwd-err').style.display = 'block';
}
function boot() {
  renderMemoryList();
  if (!state.ghToken || !state.apiKey) {
    addSystemMsg('⚙️ 首次使用：请点左下角「设置」，填入 OpenRouter API Key 和 GitHub 令牌');
    if (!state.ghToken) return;
  }
  refreshSkill();
}
async function refreshSkill() {
  if (!state.ghToken) { setCtx('❌ 缺少 GitHub 令牌'); return; }
  setCtx('⏳ 加载中...');
  try {
    state.skillContent = await ghRead(SKILL_PATH);
    state.skillLoaded = true;
    setCtx('✓ 已加载最新规则 (' + (state.skillContent.length/1024).toFixed(1) + ' KB)');
    addSystemMsg('✅ 规则库已从私有仓库加载');
  } catch(e) { setCtx('❌ ' + e.message); addSystemMsg('❌ ' + e.message); }
}
function renderMemoryList() {
  const box = document.getElementById('memory-list');
  box.innerHTML = '';
  for (const [file, label] of MEMORIES) {
    const b = document.createElement('button');
    b.innerHTML = '<span class="dot"></span> ' + label;
    b.onclick = () => toggleMemory(file, label, b);
    box.appendChild(b);
  }
}
async function toggleMemory(file, label, btn) {
  if (state.loadedMemories[file]) {
    delete state.loadedMemories[file];
    btn.classList.remove('active');
    addSystemMsg('📤 已卸载: ' + label);
    return;
  }
  btn.classList.add('loading');
  try {
    state.loadedMemories[file] = await ghRead('memory/' + file + '.md');
    btn.classList.add('active');
    addSystemMsg('📥 已加载: ' + label);
  } catch(e) { addSystemMsg('❌ ' + label + ' 加载失败: ' + e.message); }
  btn.classList.remove('loading');
}

// ================= 对话 =================
async function sendMessage() {
  if (!state.apiKey) { addSystemMsg('❌ 请先在「设置」填 OpenRouter API Key'); return; }
  if (!state.skillLoaded) { addSystemMsg('❌ 规则库未加载（检查 GitHub 令牌后刷新页面）'); return; }
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  document.getElementById('send-btn').disabled = true;
  addMessage('user', text);
  const thinking = addMessage('ai', '⏳ 思考中...');
  thinking.classList.add('loading');
  try {
    let ctx = state.skillContent;
    for (const [name, c] of Object.entries(state.loadedMemories)) ctx += '\n\n--- 参考记忆: ' + name + ' ---\n' + c;
    const sys = '你是 Seedance 2.0 视频提示词专家，严格按以下规则工作。\n\n=== 规则库 ===\n' + ctx +
      '\n\n=== 指令 ===\n1. 按用户需求生成可直接复制到即梦平台的中文提示词\n2. 适用时提供2-3个版本\n' +
      '3. 当用户要求更新/修改/增加规则时，正常回答后，在末尾用如下格式输出更新后的完整 SKILL.md：\n```skill-update\n<完整文件内容>\n```';
    const r = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method:'POST',
      headers:{ 'Content-Type':'application/json','Authorization':'Bearer '+state.apiKey,'HTTP-Referer':location.href,'X-Title':'Seedance Workbench' },
      body: JSON.stringify({ model: state.model, max_tokens: 16384, temperature: 0.7,
        messages: [{role:'system',content:sys}, ...state.messages, {role:'user',content:text}] })
    });
    if (!r.ok) throw new Error('AI 接口错误 ' + r.status + ': ' + (await r.text()).slice(0,200));
    const reply = (await r.json()).choices[0].message.content;
    const m = reply.match(/```skill-update\n([\s\S]*?)```/);
    thinking.classList.remove('loading');
    if (m) {
      state.pendingUpdate = m[1].trim();
      thinking.textContent = reply.replace(/```skill-update\n[\s\S]*?```/,'').trim() || '（规则更新已生成）';
      showUpdateCard();
    } else thinking.textContent = reply;
    state.messages.push({role:'user',content:text},{role:'assistant',content:reply});
    if (state.messages.length > 20) state.messages = state.messages.slice(-20);
  } catch(e) { thinking.classList.remove('loading'); thinking.textContent = '❌ ' + e.message; }
  document.getElementById('send-btn').disabled = false;
  scrollDown();
}
function showUpdateCard() {
  const div = document.createElement('div');
  div.className = 'msg update-card';
  div.innerHTML = '<strong>📝 规则更新已生成</strong> (' + (state.pendingUpdate.length/1024).toFixed(1) + ' KB)<br>' +
    '<button onclick="pushUpdate(this)">🚀 推送到 GitHub（所有设备生效）</button>' +
    '<button class="ghost" onclick="downloadUpdate()">⬇️ 仅下载</button>';
  document.getElementById('messages').appendChild(div);
  scrollDown();
}
async function pushUpdate(btn) {
  if (!state.pendingUpdate) return;
  btn.disabled = true; btn.textContent = '⏳ 推送中...';
  try {
    const sha = await ghWrite(SKILL_PATH, state.pendingUpdate, 'web-update: ' + new Date().toLocaleString('zh-CN'));
    state.skillContent = state.pendingUpdate;
    state.pendingUpdate = null;
    btn.textContent = '✅ 已推送 (' + sha + ')';
    addSystemMsg('✅ 规则已推送到 GitHub！所有设备下次打开自动使用新规则');
    setCtx('✓ 规则已同步 (' + sha + ')');
  } catch(e) { btn.disabled = false; btn.textContent = '🚀 重试推送'; addSystemMsg('❌ 推送失败: ' + e.message); }
}
function downloadUpdate() {
  const blob = new Blob([state.pendingUpdate || state.skillContent], {type:'text/markdown'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'SKILL.md'; a.click();
}

// ================= 设置 =================
function openSettings() {
  const o = document.createElement('div');
  o.className = 'modal-overlay';
  o.innerHTML = `<div class="modal">
    <h3>⚙️ 设置</h3>
    <label>① OpenRouter API Key（AI 对话用）</label>
    <input type="password" id="s-key" value="${state.apiKey||''}" placeholder="sk-or-v1-...">
    <small>申请: <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a> · 只存在本浏览器</small>
    <label>② GitHub 令牌（读写你的私有规则库）</label>
    <input type="password" id="s-gh" value="${state.ghToken||''}" placeholder="github_pat_...">
    <small>申请: <a href="https://github.com/settings/personal-access-tokens/new" target="_blank">github.com/settings/personal-access-tokens/new</a><br>
    Repository access 选 Only select repositories → fenjing<br>Permissions → Contents → <b>Read and write</b></small>
    <label>③ 模型</label>
    <select id="s-model">
      <option value="deepseek/deepseek-v4-pro">DeepSeek V4 Pro [1M上下文] ★推荐</option>
      <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash (免费)</option>
      <option value="deepseek/deepseek-chat-v3-0324">DeepSeek V3</option>
      <option value="anthropic/claude-sonnet-4">Claude Sonnet 4</option>
    </select>
    <div class="btns">
      <button class="secondary" onclick="this.closest('.modal-overlay').remove()">取消</button>
      <button class="primary" onclick="saveSettings(this)">💾 保存</button>
    </div>
  </div>`;
  document.body.appendChild(o);
  o.querySelector('#s-model').value = state.model;
  o.addEventListener('click', e => { if (e.target===o) o.remove(); });
}
function saveSettings(btn) {
  const k = document.getElementById('s-key').value.trim();
  const g = document.getElementById('s-gh').value.trim();
  const m = document.getElementById('s-model').value;
  if (k) { state.apiKey = k; localStorage.setItem('sd_api_key', btoa(k)); }
  if (g) { state.ghToken = g; localStorage.setItem('sd_gh_token', btoa(g)); }
  state.model = m; localStorage.setItem('sd_model', m);
  btn.closest('.modal-overlay').remove();
  addSystemMsg('✅ 设置已保存');
  if (state.ghToken && !state.skillLoaded) refreshSkill();
}

// ================= 手动编辑规则 =================
function openUpdateRules() {
  if (!state.skillContent) { addSystemMsg('❌ 规则未加载'); return; }
  const o = document.createElement('div');
  o.className = 'modal-overlay';
  o.innerHTML = `<div class="modal" style="width:760px">
    <h3>📝 编辑规则 (SKILL.md)</h3>
    <textarea id="edit-skill"></textarea>
    <div class="btns">
      <button class="secondary" onclick="this.closest('.modal-overlay').remove()">取消</button>
      <button class="primary" onclick="pushManualEdit(this)">🚀 保存并推送到 GitHub</button>
    </div>
  </div>`;
  document.body.appendChild(o);
  o.querySelector('#edit-skill').value = state.skillContent;
  o.addEventListener('click', e => { if (e.target===o) o.remove(); });
}
async function pushManualEdit(btn) {
  const content = document.getElementById('edit-skill').value;
  btn.disabled = true; btn.textContent = '⏳ 推送中...';
  try {
    const sha = await ghWrite(SKILL_PATH, content, 'manual-edit: ' + new Date().toLocaleString('zh-CN'));
    state.skillContent = content;
    btn.closest('.modal-overlay').remove();
    addSystemMsg('✅ 规则已推送到 GitHub (' + sha + ')');
    setCtx('✓ 规则已同步 (' + sha + ')');
  } catch(e) { btn.disabled = false; btn.textContent = '🚀 重试'; addSystemMsg('❌ ' + e.message); }
}

// ================= 工具 =================
function addMessage(role, content) {
  const d = document.createElement('div');
  d.className = 'msg ' + role; d.textContent = content;
  document.getElementById('messages').appendChild(d); scrollDown(); return d;
}
function addSystemMsg(t) {
  const d = document.createElement('div');
  d.className = 'msg system'; d.textContent = t;
  document.getElementById('messages').appendChild(d); scrollDown();
}
function setCtx(t) { document.getElementById('ctx-indicator').textContent = '规则库: ' + t; }
function scrollDown() { const m = document.getElementById('messages'); setTimeout(()=>m.scrollTop=m.scrollHeight,50); }

// ================= 启动 =================
if (sessionStorage.getItem('sd_auth')==='1') { document.body.classList.add('ready'); boot(); }
</script>
</body>
</html>
